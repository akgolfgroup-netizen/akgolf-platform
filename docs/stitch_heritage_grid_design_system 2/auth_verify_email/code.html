<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&amp;family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#bcf0ae",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#ece8df",
                    "on-secondary-fixed": "#191e00",
                    "error-container": "#ffdad6",
                    "surface-container": "#f1eee5",
                    "surface-variant": "#e6e2d9",
                    "on-surface-variant": "#42493e",
                    "on-primary-container": "#9dd090",
                    "on-primary": "#ffffff",
                    "on-tertiary-fixed-variant": "#23501e",
                    "on-tertiary-container": "#9dd090",
                    "on-primary-fixed-variant": "#23501e",
                    "surface-bright": "#fdf9f0",
                    "inverse-surface": "#31302b",
                    "outline": "#72796e",
                    "on-error": "#ffffff",
                    "secondary-fixed": "#d2f000",
                    "primary-fixed": "#bcf0ae",
                    "tertiary-container": "#2d5a27",
                    "surface-dim": "#dddad1",
                    "primary-container": "#2d5a27",
                    "tertiary-fixed-dim": "#a1d494",
                    "on-secondary-container": "#5b6900",
                    "surface-tint": "#3b6934",
                    "on-primary-fixed": "#002201",
                    "background": "#fdf9f0",
                    "secondary": "#576500",
                    "on-secondary": "#ffffff",
                    "on-tertiary-fixed": "#002201",
                    "outline-variant": "#c2c9bb",
                    "on-tertiary": "#ffffff",
                    "surface": "#fdf9f0",
                    "secondary-container": "#d0ed00",
                    "surface-container-highest": "#e6e2d9",
                    "on-surface": "#1c1c16",
                    "on-background": "#1c1c16",
                    "primary": "#154212",
                    "secondary-fixed-dim": "#b8d300",
                    "inverse-primary": "#a1d494",
                    "on-error-container": "#93000a",
                    "error": "#ba1a1a",
                    "primary-fixed-dim": "#a1d494",
                    "tertiary": "#154212",
                    "inverse-on-surface": "#f4f0e7",
                    "surface-container-low": "#f7f3ea",
                    "on-secondary-fixed-variant": "#414c00"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["DM Sans", "sans-serif"],
                    "body": ["DM Sans", "sans-serif"],
                    "label": ["DM Sans", "sans-serif"],
                    "mono": ["JetBrains Mono", "monospace"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #fdf9f0;
        }
        .bento-glow {
            background: linear-gradient(135deg, rgba(210, 240, 0, 0.05) 0%, rgba(21, 66, 18, 0.02) 100%);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-secondary-fixed selection:text-on-secondary-fixed">
<!-- Transactional Screen: Navigation Suppressed per Shell Visibility & Relevance rule -->
<main class="w-full max-w-xl">
<!-- Main Verification Card -->
<div class="bg-surface-container-lowest rounded-[24px] p-8 md:p-12 shadow-[0_4px_16px_rgba(45,90,39,0.06)] relative overflow-hidden group">
<!-- Background Accent -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-secondary-fixed/10 rounded-full blur-3xl"></div>
<div class="relative flex flex-col items-center text-center space-y-8">
<!-- Icon Assembly -->
<div class="relative">
<div class="w-24 h-24 bg-secondary-fixed rounded-full flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="mail">mail</span>
</div>
<!-- Decorative Pulsing Ring -->
<div class="absolute inset-0 w-24 h-24 bg-secondary-fixed rounded-full animate-ping opacity-20"></div>
</div>
<!-- Text Content -->
<div class="space-y-4">
<h1 class="text-3xl md:text-4xl font-bold tracking-tight text-primary font-headline">Verify Your Email</h1>
<p class="text-on-surface-variant max-w-sm mx-auto leading-relaxed">
                        We've sent a verification link to your inbox. Please click the link to confirm your account.
                    </p>
</div>
<!-- Email Address Display -->
<div class="bg-surface-container-low px-6 py-4 rounded-xl inline-flex items-center gap-3 border border-outline-variant/10">
<span class="material-symbols-outlined text-primary/60 text-xl" data-icon="alternate_email">alternate_email</span>
<span class="font-mono text-sm font-medium tracking-tight text-primary">alex.walker@aksports.com</span>
</div>
<!-- Action Block -->
<div class="w-full space-y-4 pt-4">
<!-- Primary CTA -->
<button class="w-full bg-secondary-fixed hover:bg-secondary-container text-on-secondary-fixed font-medium py-4 px-8 rounded-xl transition-all duration-300 flex items-center justify-center gap-2 group/btn shadow-md active:scale-95">
<span class="font-label uppercase tracking-wider text-sm">I've verified</span>
<span class="material-symbols-outlined text-xl transition-transform group-hover/btn:translate-x-1" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Secondary CTA -->
<button class="w-full bg-primary text-on-primary hover:bg-primary-container font-medium py-4 px-8 rounded-xl transition-all duration-300 flex items-center justify-center gap-2 active:scale-95">
<span class="material-symbols-outlined text-xl" data-icon="open_in_new">open_in_new</span>
<span class="font-label uppercase tracking-wider text-sm">Open email app</span>
</button>
</div>
<!-- Footer Links -->
<div class="pt-6 flex flex-col items-center gap-4">
<div class="flex items-center gap-2 text-sm text-on-surface-variant">
<span>Didn't receive anything?</span>
<a class="text-primary font-bold hover:underline underline-offset-4 transition-all" href="#">Resend email</a>
</div>
<a class="inline-flex items-center gap-1 text-xs font-mono uppercase tracking-widest text-on-surface-variant/60 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-base" data-icon="arrow_back">arrow_back</span>
                        Back to Login
                    </a>
</div>
</div>
</div>
<!-- System Status Bento Mini -->
<div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="bg-surface-container-low p-5 rounded-xl flex items-center gap-4 border border-outline-variant/5">
<div class="w-10 h-10 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="verified_user">verified_user</span>
</div>
<div>
<p class="text-[10px] font-mono uppercase tracking-widest text-on-surface-variant/60">Status</p>
<p class="text-xs font-semibold text-primary">Awaiting Confirmation</p>
</div>
</div>
<div class="bg-surface-container-low p-5 rounded-xl flex items-center gap-4 border border-outline-variant/5">
<div class="w-10 h-10 rounded-lg bg-surface-container-highest flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="timer">timer</span>
</div>
<div>
<p class="text-[10px] font-mono uppercase tracking-widest text-on-surface-variant/60">Expires In</p>
<p class="text-xs font-semibold text-primary">23:59:51</p>
</div>
</div>
</div>
</main>
<!-- Visual Polish: Background Image for Atmosphere -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
<div class="absolute top-0 left-0 w-full h-full opacity-5" data-alt="subtle organic texture with soft flowing lines and warm alabaster and light green tones in a clean minimalist aesthetic" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDMb6FYrjoWvNDAl4-RN83pIIjfjQ_OEYsLXnL4yBTqH8E9ps1G0OES-1jpFDQF8mz9UFJzrCqn9H0Lpy03_kE-QErKeXS7mKqDIb_N3UrDgg35wCv10WSZM0ikHFAa8ZqO388BiEQ2gd81EmfJ2V9XVup_-6-Zk-wq_tbDaZqqJpiEYUUNQgxWtRKU1eq7z0cIH8Dh6RMFZWnhxu5wDd0TYllys94xqhiVBEIgflC0HwgZGiCxJlAuftIrhKukSLcRQNlWrp-ZZfYY'); background-size: cover; background-position: center;">
</div>
</div>
</body></html>
