<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

            white-space: nowrap;

        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #fdf9f0;
            color: #1c1c16;
        }

            background: linear-gradient(135deg, rgba(210, 240, 0, 0.05) 0%, rgba(21, 66, 18, 0.02) 100%);

<body class="min-h-screen flex items-center justify-center p-6 bg-surface selection:bg-secondary-fixed selection:text-on-secondary-fixed">
<main class="w-full max-w-[480px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Logo Section -->
<div class="flex flex-col items-center mb-10">
<div class="mb-4">
<span class="text-primary font-headline font-bold text-3xl tracking-tighter">AK Sports OS</span>
</div>
<p class="font-mono text-[10px] uppercase tracking-[0.2em] text-primary/60">The Curated Laboratory v.1.0</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-[24px] p-10 bento-glow shadow-[0_4px_16px_rgba(45,90,39,0.04)] relative overflow-hidden">
<div class="relative z-10">
<h1 class="text-2xl font-headline font-bold text-primary mb-2">Sign In</h1>
<p class="text-on-surface-variant text-sm mb-8">Enter your credentials to access the admin console.</p>
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-mono text-[11px] uppercase tracking-wider text-primary font-semibold block ml-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface focus:ring-1 focus:ring-primary/20 transition-all placeholder:text-on-surface-variant/40 text-sm" id="email" placeholder="admin@aksports.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="font-mono text-[11px] uppercase tracking-wider text-primary font-semibold" for="password">Password</label>
<a class="text-[11px] font-mono uppercase tracking-wider text-primary hover:opacity-70 transition-opacity" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3.5 text-on-surface focus:ring-1 focus:ring-primary/20 transition-all placeholder:text-on-surface-variant/40 text-sm" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3 px-1">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20 transition-all cursor-pointer" id="remember" type="checkbox"/>
<label class="text-sm text-on-surface-variant cursor-pointer select-none" for="remember">Keep me signed in for 30 days</label>
</div>
<!-- CTA Button -->
<button class="cta-gradient w-full py-4 rounded-xl text-on-secondary-fixed font-headline font-bold uppercase tracking-widest text-xs hover:scale-[0.98] transition-transform active:scale-95" type="submit">
                        Sign In
                    </button>
</form>
<!-- Divider -->
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-surface-variant/50"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="bg-surface-container-lowest px-4 text-on-surface-variant/60 font-mono uppercase tracking-tighter">or continue with</span>
</div>
</div>
<!-- Social Sign In -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-surface-container-low border border-outline-variant/10 hover:bg-surface-variant transition-colors py-3 rounded-xl">
<img alt="Google" class="w-5 h-5" data-alt="Official Google G logo with clean colorful iconic branding" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDaCNGoYcyO8eMtO-ccuIy1wow14e7mpQX0CgMa-N4zvnlpDARYpsoKITZoO9MlS2SNp6hRuRTmKg_Rq6DlyzKTaTLtx-oEadnFeKoXZtQDAgHqdvhekyc995foyMfq2z3wycznn4vJiE2TjXABE_lm_BIYlZfhqxjfikNbnivudD_h7bffhe_e0P4PGYRAUCBsPJ5yOIMZiINp0SrNBxD9zVpwtOiEYcPbYzRj4u6yD7EYd2l_CNSvJFxrJeZD53WW2ASEeYGuGuDg"/>
<span class="text-sm font-semibold text-primary">Google</span>
</button>
<button class="flex items-center justify-center gap-3 bg-surface-container-low border border-outline-variant/10 hover:bg-surface-variant transition-colors py-3 rounded-xl">
<span class="material-symbols-outlined text-primary" data-weight="fill">ios</span>
<span class="text-sm font-semibold text-primary">Apple</span>
</button>
</div>
</div>
<!-- Background Aesthetic Element -->
<div class="absolute -bottom-12 -right-12 w-48 h-48 bg-secondary-fixed/10 rounded-full blur-3xl -z-0"></div>
</div>
<!-- Footer Link -->
<p class="text-center mt-8 text-sm text-on-surface-variant">
            Don't have an account? 
            <a class="text-primary font-bold hover:underline underline-offset-4 decoration-primary/30 transition-all" href="#">Sign up</a>
</p>
<!-- Technical Metadata -->
<div class="mt-12 flex justify-between items-center px-4 opacity-30">
<span class="font-mono text-[9px] uppercase tracking-widest">System Status: Optimal</span>
<span class="font-mono text-[9px] uppercase tracking-widest">Last Auth: 10.02.2024</span>
</div>
</main>
