<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AK Sports OS - Swing Analysis</title>

                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #1c1c16; /* Deep dark for video focus */
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex items-center justify-center min-h-screen">
<!-- Mobile Container (390px) -->
<div class="w-[390px] h-[844px] bg-black relative overflow-hidden flex flex-col shadow-2xl">
<!-- Video Canvas -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-80" data-alt="professional golfer in mid-swing on a lush green course with soft morning sunlight highlighting form and posture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBo0Bf7DuT3HdHcVllHmYxXbDRESECH-Wc48N123j-TfMLpzfC9bM8t7NbEnMa5BhGlJL3o-KAyY_IUyp97t_f_EuedVJH78DY3auY5OKxw-i12vdXDSNwv5Ljt51n5wmyyZ3Hr1x1pdDEo7kyym9sRVDuELlK_Ib64kHmnOCAxmLJIX84m7HXi58Mrpxyd4GyGakPaCKiDxWv0KEn3TroEOhGlpEMW_2LDE0ccjKVry0tSgsbV5EOlbUW2ln4DBVvjCwKJ2R5qm0aJ"/>
<!-- Pro Annotation Overlays (Canvas Layer) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none z-10" viewbox="0 0 390 844">
<!-- Lead Arm Line -->
<line stroke="#d2f000" stroke-linecap="round" stroke-width="3" x1="180" x2="140" y1="320" y2="480"></line>
<circle cx="180" cy="320" fill="#d2f000" r="4"></circle>
<circle cx="140" cy="480" fill="#d2f000" r="4"></circle>
</svg>
</div>
<!-- Top App Bar (Shared Component Strategy) -->
<header class="bg-[#fdf9f0]/10 backdrop-blur-md z-50 flex justify-between items-center w-full px-4 py-6">
<button class="bg-[#d2f000] text-[#154212] px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wider active:scale-95 transition-transform">
                Done
            </button>
<div class="flex flex-col items-center">
<h1 class="text-white font-['DM_Sans'] font-semibold tracking-tight text-sm">Swing Analysis</h1>
<span class="text-white/60 text-[10px] font-medium mono uppercase tracking-widest">Sept 10, 2023</span>
</div>
<div class="w-10 h-10 rounded-full overflow-hidden border-2 border-[#d2f000]/30">
<img class="w-full h-full object-cover" data-alt="professional sports coach headshot with friendly expression and athletic attire" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCsZ3RrqRTUZFFcD11wGhIyhnUGjOdoduC2lRNceeetoOf2s2Li2fgl455br7ZMpYy_dKikkaVW_t7cHBSs7vP8lkkIgLrfgdj7-QzrhfCYlMrL79AUx-GFl0howmALPYfgIAgDh8aF7ZGUr1Nvpj8IOLsCbgUFQ32x_aBWFMyOhU-2dc2Ias7HGa1h9OTJ8Z3xGml0EVZWVIxgMoN3oil97aAlOaFcRYGWLTNhIu5PXqNytuwzxwdrzoxmQxIJiOTXIzlx9I9UFlY-"/>
</div>
</header>
<!-- Tools Sidebar (Bento Style Vertically) -->
<aside class="absolute left-4 top-1/2 -translate-y-1/2 flex flex-col gap-3 z-30">
<button class="w-12 h-12 bg-[#154212]/80 backdrop-blur-xl rounded-2xl flex items-center justify-center text-[#d2f000] border border-white/10 active:scale-90 transition-all shadow-lg">
<span class="material-symbols-outlined" data-icon="edit">edit</span>
</button>
<button class="w-12 h-12 bg-white/10 backdrop-blur-xl rounded-2xl flex items-center justify-center text-white border border-white/10 active:scale-90 transition-all shadow-lg">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
<button class="w-12 h-12 bg-white/10 backdrop-blur-xl rounded-2xl flex items-center justify-center text-white border border-white/10 active:scale-90 transition-all shadow-lg">
<span class="material-symbols-outlined" data-icon="splitscreen">splitscreen</span>
</button>
</aside>
<!-- Annotation Callout -->
<div class="absolute top-[45%] right-8 z-20">
<div class="bg-[#d2f000] p-3 rounded-2xl rounded-tr-none shadow-xl flex items-start gap-2 max-w-[160px] relative">
<span class="material-symbols-outlined text-[#154212] text-sm" style="font-variation-settings: 'FILL' 1;">info</span>
<p class="text-[#154212] font-['DM_Sans'] font-bold text-xs leading-tight">Keep lead arm straight</p>
<!-- Tail -->
<div class="absolute -top-1 -right-1 w-4 h-4 bg-[#d2f000] rotate-45 -z-10"></div>
</div>
</div>
<!-- Video Controls Bottom Section -->
<footer class="mt-auto relative z-40 px-4 pb-8 space-y-6">
<!-- Scrub Bar -->
<div class="space-y-2">
<div class="flex justify-between items-end mb-1">
<span class="text-white mono text-[10px] bg-black/40 px-2 py-0.5 rounded">00:02.45</span>
<span class="text-white/50 mono text-[10px]">00:04.12</span>
</div>
<div class="relative h-1.5 w-full bg-white/20 rounded-full overflow-hidden">
<div class="absolute left-0 top-0 h-full w-3/5 bg-[#d2f000] rounded-full"></div>
<div class="absolute left-3/5 top-1/2 -translate-y-1/2 -ml-1 w-3 h-3 bg-white rounded-full shadow-[0_0_8px_rgba(255,255,255,0.8)]"></div>
</div>
</div>
<!-- Playback Controls Bento -->
<div class="grid grid-cols-5 gap-2 items-center">
<!-- Speed Toggles -->
<div class="col-span-2 flex bg-white/10 backdrop-blur-xl rounded-2xl p-1 border border-white/5">
<button class="flex-1 py-2 text-[10px] font-bold text-white/50 mono uppercase rounded-xl transition-colors">0.5x</button>
<button class="flex-1 py-2 text-[10px] font-bold text-[#154212] bg-[#d2f000] mono uppercase rounded-xl shadow-sm">0.25x</button>
</div>
<!-- Main Action -->
<div class="col-span-1 flex justify-center">
<button class="w-16 h-16 bg-[#d2f000] rounded-full flex items-center justify-center text-[#154212] shadow-[0_0_30px_rgba(210,240,0,0.3)] active:scale-90 transition-transform">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</div>
<!-- Frame Steps -->
<div class="col-span-2 flex justify-around bg-white/10 backdrop-blur-xl rounded-2xl p-1 border border-white/5">
<button class="p-2 text-white/80 active:text-[#d2f000]">
<span class="material-symbols-outlined">chevron_left</span>
</button>
<button class="p-2 text-white/80 active:text-[#d2f000]">
<span class="material-symbols-outlined">chevron_right</span>
</button>
</div>
</div>
<!-- Meta/Session Info Pill -->
<div class="flex justify-center">
<div class="inline-flex items-center gap-2 bg-white/5 backdrop-blur-md px-4 py-2 rounded-full border border-white/10">
<span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
<span class="text-white/70 text-[10px] uppercase font-bold tracking-[0.2em] mono">AI Form Detection Active</span>
</div>
</div>
</footer>
<!-- Background Gradient for legibility -->
<div class="absolute bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-black via-black/60 to-transparent pointer-events-none z-30"></div>
<div class="absolute top-0 left-0 w-full h-32 bg-gradient-to-b from-black/80 to-transparent pointer-events-none z-30"></div>
</div>
</body></html>
