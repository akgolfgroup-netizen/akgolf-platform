<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .apple-pay-btn { background: #000; color: #fff; }
        .google-pay-btn { background: #fff; color: #3c4043; border: 1px solid #dadce0; }
        ::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface font-body antialiased min-h-screen flex flex-col items-center">
<!-- Header Navigation (Suppressing TopAppBar for focus) -->
<header class="w-full max-w-[390px] px-6 py-6 flex items-center justify-between z-50">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h1 class="text-primary font-headline font-bold text-lg uppercase tracking-tight">Checkout</h1>
<div class="w-10"></div>
</header>
<main class="w-full max-w-[390px] px-6 pb-32 space-y-8">
<!-- Order Summary Card -->
<section class="bg-surface-container-lowest p-6 rounded-3xl shadow-[0_4px_16px_rgba(45,90,39,0.06)] relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bg-secondary-container/10 rounded-full -mr-16 -mt-16 blur-3xl"></div>
<div class="flex items-start justify-between mb-6">
<div>
<span class="text-[10px] font-mono font-medium text-primary/40 uppercase tracking-widest block mb-1">Service Details</span>
<h2 class="text-xl font-headline font-bold text-primary tracking-tight">Elite Performance Session</h2>
</div>
<div class="w-12 h-12 rounded-xl overflow-hidden bg-surface-container-highest">
<img alt="Professional sports coach in athletic gear with a focused expression on a sunny outdoor training field" class="w-full h-full object-cover" data-alt="professional athletic coach with a whistle wearing a performance jacket standing on a green field at sunset" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB9mqIp7xR3UIeFL7HBRRyWS5OP85YqYKtL-Rg-8zf1Ye2UXW8ui2a3_lr4mj6P1FuUnV9nKo8KZKjLaJr24EBNk1SBXKf6JwMxEHO5LjF60RFCvAse1z1CU58lBRwfwxqQZqDlW6LHHxDxOqFWZOwOkm_QqFNFug7LqcHE4otIGzdH45rVyvIzUnX8-NqlXj_1WJI3lURNMcFeh7OegeqH6HPNiiifn5che6hChIhKL7B9ZRXL0W84k9r0j8sv5EpNoQlKA83LEuWk"/>
</div>
</div>
<div class="space-y-3">
<div class="flex justify-between items-center">
<span class="text-sm text-on-surface-variant font-medium">Lead Coach</span>
<span class="text-sm font-headline font-semibold text-primary">Coach Marcus Chen</span>
</div>
<div class="flex justify-between items-center">
<span class="text-sm text-on-surface-variant font-medium">Duration</span>
<span class="text-sm font-headline font-semibold text-primary">90 Minutes</span>
</div>
<div class="pt-4 mt-4 border-t border-surface-container-highest flex justify-between items-center">
<span class="text-sm font-bold text-primary uppercase tracking-tighter">Total Amount</span>
<span class="text-2xl font-mono font-extrabold text-primary">$150.00</span>
</div>
</div>
</section>
<!-- Express Checkout -->
<section class="space-y-3">
<button class="apple-pay-btn w-full h-14 rounded-xl flex items-center justify-center gap-2 font-headline font-medium active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">ios</span>
<span>Pay</span>
</button>
<button class="google-pay-btn w-full h-14 rounded-xl flex items-center justify-center gap-2 font-headline font-medium active:scale-95 transition-transform">
<img alt="Google Pay Logo" class="h-6" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDXquLv2inXF--2OrLL81LLsZSjMTV5vrujtqiLUHHq3jliRpQ_d9ruCgDlCY7KYhCVpmtqqBcH2gkxKW3_KfvP6bueam-JebKtAT5DRgWmoaLxyqkEAgGc-2afz4B9yz7e07Z8cBjt1buCy5yM425SUTqDI6pDM2aJyd5O6H04Sz1Eu-mme1LwNTDdnmLDIlACmQ03Q_5hUX6N_UcG1kJtGa-XR5mP5JCacyUXp8-gLE7rdBQsbFiR5ybUn8iLSlk8e_2ikgTtXs0D"/>
</button>
</section>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="flex-1 h-px bg-surface-container-highest"></div>
<span class="text-[10px] font-mono text-on-surface-variant uppercase tracking-widest">or pay with card</span>
<div class="flex-1 h-px bg-surface-container-highest"></div>
</div>
<!-- Credit Card Form -->
<section class="space-y-4">
<div class="space-y-1.5">
<label class="text-[10px] font-mono font-semibold text-primary uppercase ml-1 tracking-widest">Card Number</label>
<div class="relative">
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl px-4 font-mono text-sm focus:ring-1 focus:ring-primary/20 transition-all" placeholder="0000 0000 0000 0000" type="text"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-on-surface-variant/40">credit_card</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-[10px] font-mono font-semibold text-primary uppercase ml-1 tracking-widest">Expiry Date</label>
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl px-4 font-mono text-sm focus:ring-1 focus:ring-primary/20 transition-all" placeholder="MM/YY" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-[10px] font-mono font-semibold text-primary uppercase ml-1 tracking-widest">CVV</label>
<input class="w-full h-14 bg-surface-container-low border-none rounded-xl px-4 font-mono text-sm focus:ring-1 focus:ring-primary/20 transition-all" placeholder="***" type="password"/>
</div>
</div>
<!-- Save for future bookings toggle -->
<div class="flex items-center justify-between bg-surface-container-low p-4 rounded-xl mt-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">account_balance_wallet</span>
<span class="text-sm font-medium text-on-surface font-headline">Save for future bookings</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</section>
</main>
<!-- Sticky Bottom Button -->
<div class="fixed bottom-0 left-0 right-0 w-full max-w-[390px] mx-auto p-6 bg-gradient-to-t from-background via-background to-transparent pt-12">
<button class="w-full h-16 bg-secondary-fixed text-on-secondary-fixed rounded-2xl flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-transform duration-150">
<span class="text-base font-headline font-bold uppercase tracking-widest">Pay &amp; Confirm</span>
<span class="text-sm font-mono opacity-60">$150.00</span>
<span class="material-symbols-outlined text-xl">verified_user</span>
</button>
<p class="text-center text-[10px] text-on-surface-variant font-mono mt-4 opacity-50 tracking-tighter">
            ENCRYPTED SECURE PAYMENT • POWERED BY AK SPORTS OS
        </p>
</div>
