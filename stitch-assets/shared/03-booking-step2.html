<!DOCTYPE html>

<html lang="no"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "on-background": "#2d3435",

                        "on-tertiary-container": "#005f28",
                        "primary-fixed": "#e4e2e1",

                        "on-primary": "#faf7f6",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-surface text-on-surface antialiased min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/70 dark:bg-zinc-900/70 backdrop-blur-md">
<div class="flex justify-between items-center px-6 py-4 max-w-[800px] mx-auto">
<span class="text-lg font-bold tracking-tight text-zinc-900 dark:text-zinc-50">The Digital Curator</span>
<div class="flex items-center gap-4">
<span class="text-xs font-semibold tracking-widest text-zinc-500 uppercase">Step 2 of 3</span>
<button class="hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
</div>
<!-- Progress Indicator -->
<div class="h-1 w-full bg-surface-container-low">
<div class="h-full bg-primary w-[66%] transition-all duration-500 ease-[cubic-bezier(0.2,0,0,1)]"></div>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-[800px] mx-auto min-h-screen">
<!-- Editorial Header Section -->
<div class="mb-12">
<p class="text-[0.75rem] font-semibold tracking-[0.05em] text-on-surface-variant uppercase mb-4">NÅR PASSER DET?</p>
<h1 class="text-[1.75rem] md:text-[2.25rem] font-bold tracking-tight text-on-surface leading-tight">Velg tidspunkt som passer</h1>
</div>
<div class="grid grid-cols-1 gap-12">
<!-- Calendar Section: Asymmetric Content -->
<section class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_20px_40px_rgba(45,52,53,0.06)]">
<div class="flex items-center justify-between mb-8">
<h3 class="text-lg font-semibold tracking-tight">Oktober 2023</h3>
<div class="flex gap-2">
<button class="p-2 hover:bg-surface-container-low rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="chevron_left">chevron_left</span>
</button>
<button class="p-2 hover:bg-surface-container-low rounded-full transition-colors">
<span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
<!-- Calendar Grid -->
<div class="grid grid-cols-7 gap-y-4 text-center">
<!-- Days -->
<div class="text-[0.75rem] font-bold text-outline-variant uppercase tracking-wider">Ma</div>
<div class="text-[0.75rem] font-bold text-outline-variant uppercase tracking-wider">Ti</div>
<div class="text-[0.75rem] font-bold text-outline-variant uppercase tracking-wider">On</div>
<div class="text-[0.75rem] font-bold text-outline-variant uppercase tracking-wider">To</div>
<div class="text-[0.75rem] font-bold text-outline-variant uppercase tracking-wider">Fr</div>
<div class="text-[0.75rem] font-bold text-outline-variant uppercase tracking-wider">Lø</div>
<div class="text-[0.75rem] font-bold text-outline-variant uppercase tracking-wider">Sø</div>
<!-- Row 1 (October starts on Sunday) -->
<div class="p-3 text-outline-variant opacity-20">25</div>
<div class="p-3 text-outline-variant opacity-20">26</div>
<div class="p-3 text-outline-variant opacity-20">27</div>
<div class="p-3 text-outline-variant opacity-20">28</div>
<div class="p-3 text-outline-variant opacity-20">29</div>
<div class="p-3 text-outline-variant opacity-20">30</div>
<div class="p-3 relative flex items-center justify-center">
<span class="z-10 font-medium">1</span>
</div>
<!-- Row 2 -->
<div class="p-3 relative flex items-center justify-center">
<span class="z-10 font-medium">2</span>
</div>
<div class="p-3 relative flex items-center justify-center">
<span class="z-10 font-medium">3</span>
</div>
<div class="p-3 relative flex items-center justify-center group cursor-pointer">
<div class="absolute inset-0 m-1 bg-primary-container rounded-lg border-2 border-primary"></div>
<span class="z-10 font-bold text-on-surface">4</span>
</div>
<div class="p-3 relative flex items-center justify-center cursor-pointer hover:bg-surface-container-low rounded-lg transition-colors">
<span class="z-10 font-medium">5</span>
</div>
<div class="p-3 relative flex items-center justify-center cursor-pointer hover:bg-surface-container-low rounded-lg transition-colors">
<span class="z-10 font-medium">6</span>
</div>
<div class="p-3 relative flex items-center justify-center cursor-pointer hover:bg-surface-container-low rounded-lg transition-colors">
<span class="z-10 font-medium">7</span>
</div>
<div class="p-3 relative flex items-center justify-center">
<span class="z-10 font-medium">8</span>
</div>
<!-- Row 3 -->
<div class="p-3 relative flex items-center justify-center cursor-pointer hover:bg-surface-container-low rounded-lg transition-colors">
<span class="z-10 font-medium">9</span>
</div>
<div class="p-3 relative flex items-center justify-center cursor-pointer hover:bg-surface-container-low rounded-lg transition-colors">
<span class="z-10 font-medium">10</span>
</div>
<div class="p-3 relative flex items-center justify-center cursor-pointer hover:bg-surface-container-low rounded-lg transition-colors">
<span class="z-10 font-medium">11</span>
</div>
<div class="p-3 relative flex items-center justify-center cursor-pointer hover:bg-surface-container-low rounded-lg transition-colors">
<span class="z-10 font-medium">12</span>
</div>
<div class="p-3 relative flex items-center justify-center bg-tertiary/10 rounded-lg">
<span class="z-10 font-semibold text-tertiary">13</span>
</div>
<div class="p-3 relative flex items-center justify-center">
<span class="z-10 font-medium">14</span>
</div>
<div class="p-3 relative flex items-center justify-center">
<span class="z-10 font-medium">15</span>
</div>
</div>
</section>
<!-- Preferences Section -->
<div class="space-y-10">
<!-- Time Preference -->
<div class="space-y-4">
<h3 class="text-[1.125rem] font-semibold tracking-tight text-on-surface">Tid på dagen</h3>
<div class="flex flex-wrap gap-3">
<button class="bg-zinc-800 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl px-6 py-3 font-semibold text-[1rem] transition-transform active:scale-95">
                            Morgen
                        </button>
<button class="bg-surface-container-lowest border border-outline-variant/15 text-on-surface-variant rounded-xl px-6 py-3 font-medium text-[1rem] hover:bg-surface-container-low transition-colors">
                            Ettermiddag
                        </button>
<button class="bg-surface-container-lowest border border-outline-variant/15 text-on-surface-variant rounded-xl px-6 py-3 font-medium text-[1rem] hover:bg-surface-container-low transition-colors">
                            Kveld
                        </button>
<button class="bg-surface-container-lowest border border-outline-variant/15 text-on-surface-variant rounded-xl px-6 py-3 font-medium text-[1rem] hover:bg-surface-container-low transition-colors">
                            Ikke viktig
                        </button>
</div>
</div>
<!-- Duration Preference -->
<div class="space-y-4">
<h3 class="text-[1.125rem] font-semibold tracking-tight text-on-surface">Varighet</h3>
<div class="flex flex-wrap gap-3">
<button class="bg-surface-container-lowest border border-outline-variant/15 text-on-surface-variant rounded-xl px-6 py-3 font-medium text-[1rem] hover:bg-surface-container-low transition-colors">
                            30min
                        </button>
<button class="bg-zinc-800 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl px-6 py-3 font-semibold text-[1rem] transition-transform active:scale-95">
                            60min
                        </button>
<button class="bg-surface-container-lowest border border-outline-variant/15 text-on-surface-variant rounded-xl px-6 py-3 font-medium text-[1rem] hover:bg-surface-container-low transition-colors">
                            90min
                        </button>
</div>
</div>
</div>
</div>
<!-- Featured Golf Visual (Ambient) -->
<div class="mt-16 rounded-2xl overflow-hidden aspect-[16/6] relative">
<img alt="Premium golf course green at dawn" class="w-full h-full object-cover" data-alt="cinematic wide shot of a pristine golf green with a single flag at sunrise, soft morning mist, elegant sports atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAWVahSAoxsj2atRfWZeB8xLVHQ0roSmxaNwaEm95_z9GnHDEnXAmSoeTD06zIoEc31yJlbA4fui96cJD3Hl4I3fGxbUVWJ9OB-1igL-EQyZ-xXd6CwGxjarGUoHCOoIl2oARThj8kuXqqnjmtEbghFeBmOZ09cm8HuhAloKCoeff7kj_MKTEYmiMVsI-riJpV7FZyox5pFwCV2dA3i4xKSA7sBJ6OFAEIA2naUAHPo5f2na2QiZ6nlSlqbg1--p_QQgfoCccxUyxs"/>
<div class="absolute inset-0 bg-gradient-to-r from-surface/40 to-transparent"></div>
</div>
</main>
<!-- BottomNavBar -->
<footer class="fixed bottom-0 w-full z-50 bg-white dark:bg-zinc-900 border-t border-zinc-100 dark:border-zinc-800 shadow-[0_-20px_40px_rgba(45,52,53,0.06)]">
<div class="flex justify-between items-center px-8 py-6 max-w-[800px] mx-auto pb-safe">
<!-- Tilbake Button -->
<button class="flex items-center gap-2 text-zinc-600 dark:text-zinc-400 font-medium px-4 py-2 hover:opacity-90 transition-opacity active:scale-[0.98]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
<span>Tilbake</span>
</button>
<!-- Neste Button (Active/Primary) -->
<button class="bg-zinc-800 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl px-8 py-3 font-semibold flex items-center gap-2 hover:opacity-90 transition-opacity active:scale-[0.98] shadow-sm">
<span>Neste</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
</body></html>
