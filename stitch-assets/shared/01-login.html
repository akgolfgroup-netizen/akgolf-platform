<!DOCTYPE html>

                        "error-container": "#fe8983",
                        "secondary": "#5f5f5f",

                        "surface-dim": "#d4dbdd",

                        "inverse-surface": "#0c0f0f",

                        "on-primary": "#faf7f6",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ambient-bloom {
            box-shadow: 0px 12px 32px rgba(45, 52, 53, 0.04);
        }
        .ghost-border {
            border: 1px solid rgba(173, 179, 180, 0.2);
        }
        .inner-glow {
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopNavBar Suppression: Page is Transactional (Login) -->
<main class="flex-grow flex items-center justify-center px-6 py-12">
<div class="w-full max-w-[420px] flex flex-col items-center">
<!-- Brand Logo Anchor -->
<div class="mb-10 text-center">
<h1 class="text-3xl font-extrabold tracking-tighter text-primary">AK Golf Portal</h1>
</div>
<!-- Login Card -->
<div class="w-full bg-surface-container-lowest rounded-xl p-8 ambient-bloom relative">
<!-- Secure Badge -->
<div class="absolute top-6 right-8 flex items-center gap-1.5 bg-tertiary-container px-3 py-1 rounded-full">
<span class="material-symbols-outlined text-[14px] text-on-tertiary-container" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
<span class="text-[10px] font-bold uppercase tracking-wider text-on-tertiary-container">Secure</span>
</div>
<!-- Header Content -->
<div class="text-center mb-8">
<h2 class="text-[32px] font-bold tracking-tight text-on-surface leading-tight">Logg inn</h2>
<p class="text-on-surface-variant text-[16px] mt-2">Tilgang til din profil og bookinger</p>
</div>
<!-- Form Section -->
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block text-[14px] font-medium text-on-surface-variant tracking-wide ml-1" for="email">E-post</label>
<input class="w-full h-12 px-4 bg-surface-container-lowest ghost-border rounded-xl focus:outline-none focus:border-primary focus:ring-0 transition-all duration-300 placeholder:text-outline-variant text-on-surface" id="email" placeholder="din@epost.no" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-end ml-1">
<label class="block text-[14px] font-medium text-on-surface-variant tracking-wide" for="password">Passord</label>
<a class="text-[14px] font-medium text-tertiary hover:text-primary transition-colors underline underline-offset-4" href="#">Glemt passord?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-4 bg-surface-container-lowest ghost-border rounded-xl focus:outline-none focus:border-primary focus:ring-0 transition-all duration-300 placeholder:text-outline-variant text-on-surface" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Action -->
<button class="w-full h-12 bg-primary text-on-primary font-semibold rounded-full inner-glow hover:bg-primary-dim active:scale-[0.98] transition-all duration-200 mt-2" type="submit">
                        Logg inn
                    </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 my-8">
<div class="flex-grow h-[1px] bg-outline-variant opacity-20"></div>
<span class="text-on-surface-variant text-[14px] font-medium">eller</span>
<div class="flex-grow h-[1px] bg-outline-variant opacity-20"></div>
</div>
<!-- Social Login -->
<div class="space-y-3">
<button class="w-full h-12 flex items-center justify-center gap-3 bg-surface-container-lowest ghost-border rounded-xl hover:bg-surface-container-low transition-all duration-300 active:scale-[0.98]">
<img alt="Google Logo" class="w-5 h-5" data-alt="Official Google logo colorful G icon on white background minimalist icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDGTUAr51aOoWkFG1A7clTh9iR_l1bisNgpkyADOIOb1K8-VZ4VXqUzpGC2J6V2S-2JszJdZwvJ3_M-xgQVfBFnEfrRDggxLFNWghYdxYh98bYd2kB7FOMuvOyDe2EsKqI0EXrgnLNBTiB-HtaSiqEsK55THvWxqBedbd85IlC87eOShdKAonU1dutINXy_h7AqHtHGvOG7xdcdWIUbaFp0hStHdIevxNSa82aP3f3Omc4sSDpc-k3hvzh6dmmS7qQb1yD3kcp0cSQ"/>
<span class="text-on-surface font-medium text-[15px]">Fortsett med Google</span>
</button>
<button class="w-full h-12 flex items-center justify-center gap-3 bg-surface-container-lowest ghost-border rounded-xl hover:bg-surface-container-low transition-all duration-300 active:scale-[0.98]">
<span class="material-symbols-outlined text-on-surface text-[20px]" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="text-on-surface font-medium text-[15px]">Fortsett med Apple</span>
</button>
</div>
<!-- Sign Up Prompt -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant text-[15px]">
                        Har du ikke konto? 
                        <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Registrer deg</a>
</p>
</div>
<!-- Security Note -->
<div class="mt-8 flex justify-center items-center gap-2 pt-6 border-t border-surface-container-low">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant" data-icon="lock">lock</span>
<span class="text-[12px] font-medium text-on-surface-variant tracking-tight">Sikker pålogging med SSL</span>
</div>
</div>
<!-- Back Link -->
<a class="mt-8 flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors font-medium text-[15px]" href="#">
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_back">arrow_back</span>
                Tilbake til forsiden
            </a>
</div>
</main>
<!-- Footer Segment -->
<footer class="w-full py-12 flex flex-col items-center gap-4">
<div class="flex flex-wrap justify-center gap-8 mb-4">
<a class="text-[0.75rem] font-medium tracking-widest uppercase text-[#5A6061] hover:text-[#5F5E5E] transition-all" href="#">Vilkår</a>
<a class="text-[0.75rem] font-medium tracking-widest uppercase text-[#5A6061] hover:text-[#5F5E5E] transition-all" href="#">Personvern</a>
<a class="text-[0.75rem] font-medium tracking-widest uppercase text-[#5A6061] hover:text-[#5F5E5E] transition-all" href="#">Kontakt</a>
</div>
<p class="text-[0.75rem] font-medium tracking-widest uppercase text-[#5A6061] opacity-80">© 2024 AK Golf Portal. Sikker pålogging med SSL.</p>
</footer>
</body></html>
