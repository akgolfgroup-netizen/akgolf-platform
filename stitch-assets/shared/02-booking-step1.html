<!DOCTYPE html>

<html class="light" lang="no"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#dde4e5",
                        "inverse-primary": "#ffffff",
                        "on-tertiary-fixed-variant": "#006a2d",
                        "secondary-dim": "#505454",
                        "on-tertiary-fixed": "#004a1d",
                        "on-primary-fixed": "#3f3f3f",
                        "on-error-container": "#752121",
                        "outline": "#757c7d",
                        "surface-container-low": "#f2f4f4",
                        "on-secondary-container": "#4f5253",
                        "primary-fixed-dim": "#d6d4d3",
                        "on-tertiary": "#e9ffe6",
                        "inverse-surface": "#0c0f0f",
                        "surface": "#f9f9f9",
                        "secondary-fixed-dim": "#d2d5d5",
                        "surface-dim": "#d4dbdd",
                        "primary-container": "#e4e2e1",
                        "surface-tint": "#5f5e5e",
                        "on-secondary-fixed-variant": "#595c5d",
                        "secondary": "#5c6060",
                        "primary-dim": "#535252",
                        "on-background": "#2d3435",
                        "primary": "#5f5e5e",
                        "on-primary-container": "#525251",
                        "on-primary-fixed-variant": "#5c5b5b",
                        "on-tertiary-container": "#005f28",
                        "primary-fixed": "#e4e2e1",
                        "inverse-on-surface": "#9c9d9d",
                        "on-surface-variant": "#5a6061",
                        "error-container": "#fe8983",
                        "error": "#9f403d",
                        "tertiary": "#006e2f",
                        "on-error": "#fff7f6",
                        "background": "#f9f9f9",
                        "surface-container-high": "#e4e9ea",
                        "on-primary": "#faf7f6",
                        "tertiary-fixed": "#6bff8f",
                        "tertiary-fixed-dim": "#5bf083",
                        "secondary-fixed": "#e1e3e3",
                        "on-secondary": "#f7f9fa",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#3c4040",
                        "surface-variant": "#dde4e5",
                        "tertiary-dim": "#006128",
                        "error-dim": "#4e0309",
                        "surface-container": "#ebeeef",
                        "outline-variant": "#adb3b4",
                        "on-surface": "#2d3435",
                        "secondary-container": "#e1e3e3",
                        "tertiary-container": "#6bff8f",
                        "surface-bright": "#f9f9f9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .progress-bar-fill {
            width: 33.33%;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/70 dark:bg-zinc-900/70 backdrop-blur-md">
<div class="flex justify-between items-center px-6 py-4 max-w-[800px] mx-auto">
<span class="text-lg font-bold tracking-tight text-zinc-900 dark:text-zinc-50">The Digital Curator</span>
<div class="flex items-center gap-2">
<span class="text-[0.75rem] font-semibold uppercase tracking-wider text-zinc-500">Steg 1 av 3</span>
<button class="p-2 hover:bg-zinc-100 dark:hover:bg-zinc-800 transition-colors rounded-full">
<span class="material-symbols-outlined text-zinc-800 dark:text-zinc-100" data-icon="close">close</span>
</button>
</div>
</div>
<!-- Progress Bar Indicator -->
<div class="w-full h-1 bg-surface-container-low">
<div class="h-full bg-primary progress-bar-fill transition-all duration-500"></div>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-[800px] mx-auto">
<!-- Editorial Header Section -->
<section class="mb-12 text-center">
<h1 class="text-[1.75rem] md:text-[2.25rem] font-bold text-on-surface leading-tight tracking-tight mb-3">
                La oss finne riktig coaching for deg
            </h1>
<p class="text-[1rem] md:text-[1.125rem] text-on-surface-variant font-medium opacity-80">
                Svar på noen spørsmål så anbefaler vi beste valg
            </p>
</section>
<!-- Question Title -->
<div class="mb-8">
<h2 class="text-[1.125rem] font-semibold text-on-surface tracking-tight">HVA TRENGER DU HJELP MED?</h2>
</div>
<!-- 2-Column Grid Options -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10">
<!-- Option 1: Active/Selected State Example -->
<button class="relative flex flex-col items-start p-6 bg-primary-container border-2 border-primary rounded-xl text-left transition-all duration-300 group">
<div class="mb-4 bg-white p-3 rounded-lg shadow-sm">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="golf_course">golf_course</span>
</div>
<span class="text-[1rem] font-semibold text-on-primary-container">Jeg vil forbedre svingen</span>
<div class="absolute top-4 right-4 text-primary">
<span class="material-symbols-outlined text-2xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Option 2 -->
<button class="relative flex flex-col items-start p-6 bg-surface-container-lowest border border-outline-variant/15 rounded-xl text-left hover:border-outline-variant/40 transition-all duration-300 group">
<div class="mb-4 bg-surface-container-low p-3 rounded-lg">
<span class="material-symbols-outlined text-on-surface-variant text-3xl" data-icon="speed">speed</span>
</div>
<span class="text-[1rem] font-medium text-on-surface">Jeg vil slå lengre</span>
</button>
<!-- Option 3 -->
<button class="relative flex flex-col items-start p-6 bg-surface-container-lowest border border-outline-variant/15 rounded-xl text-left hover:border-outline-variant/40 transition-all duration-300 group">
<div class="mb-4 bg-surface-container-low p-3 rounded-lg">
<span class="material-symbols-outlined text-on-surface-variant text-3xl" data-icon="sports_golf">sports_golf</span>
</div>
<span class="text-[1rem] font-medium text-on-surface">Jeg vil bedre putting</span>
</button>
<!-- Option 4 -->
<button class="relative flex flex-col items-start p-6 bg-surface-container-lowest border border-outline-variant/15 rounded-xl text-left hover:border-outline-variant/40 transition-all duration-300 group">
<div class="mb-4 bg-surface-container-low p-3 rounded-lg">
<span class="material-symbols-outlined text-on-surface-variant text-3xl" data-icon="analytics">analytics</span>
</div>
<span class="text-[1rem] font-medium text-on-surface">Jeg vil senke handicap</span>
</button>
<!-- Option 5 -->
<button class="relative flex flex-col items-start p-6 bg-surface-container-lowest border border-outline-variant/15 rounded-xl text-left hover:border-outline-variant/40 transition-all duration-300 group">
<div class="mb-4 bg-surface-container-low p-3 rounded-lg">
<span class="material-symbols-outlined text-on-surface-variant text-3xl" data-icon="school">school</span>
</div>
<span class="text-[1rem] font-medium text-on-surface">Jeg er nybegynner</span>
</button>
<!-- Option 6 -->
<button class="relative flex flex-col items-start p-6 bg-surface-container-lowest border border-outline-variant/15 rounded-xl text-left hover:border-outline-variant/40 transition-all duration-300 group">
<div class="mb-4 bg-surface-container-low p-3 rounded-lg">
<span class="material-symbols-outlined text-on-surface-variant text-3xl" data-icon="biotech">biotech</span>
</div>
<span class="text-[1rem] font-medium text-on-surface">Jeg vil ha total gjennomgang</span>
</button>
</div>
<!-- Annet Text Field -->
<div class="mt-8 space-y-3">
<label class="text-[0.75rem] font-semibold uppercase tracking-wider text-on-surface-variant" for="other">Annet</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant/15 rounded-xl px-6 py-4 text-[1rem] focus:outline-none focus:border-primary/40 transition-colors placeholder:text-outline" id="other" placeholder="Fortell oss hva du ønsker hjelp med..." type="text"/>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 bg-white dark:bg-zinc-900 border-t border-zinc-100 dark:border-zinc-800 shadow-[0_-20px_40px_rgba(45,52,53,0.06)]">
<div class="flex justify-between items-center px-8 py-6 max-w-[800px] mx-auto pb-safe">
<!-- Back Button (Disabled State) -->
<button class="flex items-center gap-2 text-zinc-400 font-medium px-4 py-2 cursor-not-allowed opacity-50" disabled="">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
<span>Tilbake</span>
</button>
<!-- Next Button (Primary Action) -->
<button class="flex items-center gap-2 bg-zinc-800 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-xl px-10 py-3 font-semibold hover:opacity-90 transition-opacity active:scale-[0.98]">
<span>Neste</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</nav>
</body></html>
