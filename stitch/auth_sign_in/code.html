<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #fdf9f0;
        }
        .bento-glow {
            background: linear-gradient(135deg, rgba(210, 240, 0, 0.05) 0%, rgba(21, 66, 18, 0.02) 100%);
        }
        .cta-gradient {
            background: linear-gradient(180deg, #d2f000 0%, #b8d300 100%);
        }
    </style>

<body class="bg-background text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-secondary-fixed selection:text-on-secondary-fixed">
<main class="w-full max-w-[480px] flex flex-col gap-8">
<!-- Logo Header -->
<header class="flex flex-col items-center gap-3">
<div class="flex items-center justify-center bg-primary p-3 rounded-xl shadow-lg">
<span class="material-symbols-outlined text-secondary-fixed text-3xl" data-icon="sports_score">sports_score</span>
</div>
<h1 class="font-headline font-bold text-2xl tracking-tighter text-primary uppercase">AK Sports OS</h1>
<p class="font-mono text-[10px] uppercase tracking-[0.2em] text-outline">Clinical Performance Engineering</p>
</header>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-3xl p-10 shadow-[0_4px_16px_rgba(45,90,39,0.06)] border border-outline-variant/10 relative overflow-hidden">
<div class="absolute top-0 right-0 w-32 h-32 bento-glow rounded-bl-full -mr-10 -mt-10 opacity-50"></div>
<div class="relative z-10">
<h2 class="font-headline font-semibold text-2xl text-on-surface mb-2">Sign In</h2>
<p class="text-on-surface-variant text-sm mb-8">Access your elite performance analytics dashboard.</p>
<form class="flex flex-col gap-6">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="font-mono text-[10px] uppercase tracking-widest text-outline ml-1">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-xl py-4 px-5 text-sm focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline-variant text-on-surface" placeholder="coach@aksports.os" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant text-xl" data-icon="mail">mail</span>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="font-mono text-[10px] uppercase tracking-widest text-outline ml-1">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-xl py-4 px-5 text-sm focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-outline-variant text-on-surface" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="flex items-center justify-between px-1">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20" type="checkbox"/>
<span class="text-xs text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="text-xs font-medium text-primary hover:underline underline-offset-4 decoration-secondary-fixed decoration-2" href="#">Forgot password?</a>
</div>
<!-- Primary CTA -->
<button class="cta-gradient text-on-secondary-fixed font-headline font-bold uppercase tracking-widest py-4 rounded-xl shadow-[0_4px_12px_rgba(210,240,0,0.3)] hover:scale-[1.01] active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-4 my-2">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-mono text-[10px] uppercase tracking-tighter text-outline-variant">OR CONTINUE WITH</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Social Sign In -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 border border-outline-variant/40 rounded-xl hover:bg-surface-container-low transition-colors group" type="button">
<img alt="Google" class="w-5 h-5 opacity-80 group-hover:opacity-100 transition-opacity" data-alt="Official Google logo with vibrant primary colors on white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDUqHbICDBhFQ9Qve-xbGYtwuPhDosreb7LJDuptFkvM93g9HHiq5o-BVI6FwRC2Z1_MXDpDsUZzHSIfqcVUVzY0FIg7LKZt_0KfJdSBASc0JYyXfwTeSerI_UYtcalSye96j1I88h0PKxIyKIiP4ZfmVO9_NrnfF0gUi2p59se1PJQ0lVdnorf8gdRQYH2_hDC8qp5sQpkDi_eN2HnYNmxZvmFh5Q5ReczLmxkzQyO3oSsYMOdZl9-rvn6ej_babd7fTuSJ2THiT42"/>
<span class="font-headline font-medium text-xs text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 border border-outline-variant/40 rounded-xl hover:bg-surface-container-low transition-colors group" type="button">
<span class="material-symbols-outlined text-xl text-on-surface" data-icon="apple">ios</span>
<span class="font-headline font-medium text-xs text-on-surface">Apple</span>
</button>
</div>
</form>
</div>
</div>
<!-- Footer Link -->
<footer class="text-center">
<p class="text-sm text-on-surface-variant">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline underline-offset-4 decoration-secondary-fixed decoration-2 ml-1" href="#">Sign up</a>
</p>
</footer>
</main>
<!-- Decorative Elements (Quiet Luxury Accents) -->
<div class="fixed bottom-12 right-12 opacity-10 pointer-events-none hidden lg:block">
<span class="font-mono text-[120px] font-black leading-none text-primary uppercase select-none tracking-tighter">OS</span>
</div>
<div class="fixed top-12 left-12 flex flex-col gap-1 pointer-events-none hidden lg:flex">
<div class="w-8 h-[2px] bg-secondary-fixed"></div>
<div class="w-4 h-[2px] bg-primary"></div>
<span class="font-mono text-[10px] uppercase text-outline mt-2 tracking-widest">Version 4.2.0</span>
</div>
</body></html>
