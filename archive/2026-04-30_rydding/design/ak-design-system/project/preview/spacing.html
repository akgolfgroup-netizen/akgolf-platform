<!doctype html>
<html lang="no"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--ak-text);padding:24px}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:10px;font-size:13px}
  .n{width:80px;font-family:var(--font-mono);font-size:11px;color:var(--ak-muted);text-transform:uppercase}
  .bar{background:#005840;height:14px;border-radius:3px}
  .px{color:var(--ak-muted);font-size:11px;margin-left:8px;font-family:var(--font-mono)}
</style></head><body>
<div class="row"><span class="n">xs</span><span class="bar" style="width:4px"></span><span class="px">4 px</span></div>
<div class="row"><span class="n">sm</span><span class="bar" style="width:8px"></span><span class="px">8 px</span></div>
<div class="row"><span class="n">md</span><span class="bar" style="width:16px"></span><span class="px">16 px · default card padding</span></div>
<div class="row"><span class="n">lg</span><span class="bar" style="width:24px"></span><span class="px">24 px</span></div>
<div class="row"><span class="n">xl</span><span class="bar" style="width:32px"></span><span class="px">32 px · section gap</span></div>
<div class="row"><span class="n">2xl</span><span class="bar" style="width:48px"></span><span class="px">48 px</span></div>
<div class="row"><span class="n">3xl</span><span class="bar" style="width:64px"></span><span class="px">64 px</span></div>
</body></html>
