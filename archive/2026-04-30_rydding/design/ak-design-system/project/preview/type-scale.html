<!doctype html>
<html lang="no"><head><meta charset="utf-8"><title>Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--ak-text);padding:24px 28px}
  .row{display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid #f0f3f2}
  .row:last-child{border:none}
  .meta{width:100px;flex-shrink:0;font-family:var(--font-mono);font-size:10px;color:var(--ak-muted);text-transform:uppercase;letter-spacing:.03em}
  .spec{color:var(--ak-text);opacity:.6}
</style></head><body>
<div class="row"><div class="meta">H1 · 48/1.1<div class="spec">800</div></div><div style="font:800 48px/1.1 Inter;letter-spacing:-.02em">Hei, Magnus</div></div>
<div class="row"><div class="meta">H2 · 32/1.2<div class="spec">700</div></div><div style="font:700 32px/1.2 Inter;letter-spacing:-.01em">Scoreanalyse</div></div>
<div class="row"><div class="meta">H3 · 24/1.3<div class="spec">700</div></div><div style="font:700 24px/1.3 Inter">Denne uken</div></div>
<div class="row"><div class="meta">Body · 16/1.6<div class="spec">400</div></div><div style="font:400 16px/1.6 Inter">Personlig utvikling gjennom strukturert coaching.</div></div>
<div class="row"><div class="meta">Small · 14/1.5<div class="spec">400</div></div><div style="font:400 14px/1.5 Inter;color:var(--ak-muted)">Onsdag, 9. april · Gamle Fredrikstad GK</div></div>
<div class="row"><div class="meta">Caption · 12/1.4<div class="spec">400</div></div><div style="font:400 12px/1.4 Inter;color:var(--ak-muted);text-transform:uppercase;letter-spacing:.04em">HCP: handicapindeks</div></div>
</body></html>
