<!doctype html>
<html lang="no"><head><meta charset="utf-8"><title>Type weights</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--ak-text);padding:24px}
  .row{display:flex;align-items:center;gap:14px;padding:6px 0;border-bottom:1px solid #f0f3f2}
  .row:last-child{border:none}
  .n{width:180px;font-family:var(--font-mono);font-size:10px;color:var(--ak-muted);text-transform:uppercase}
  .s{font-size:22px;letter-spacing:-.01em}
</style></head><body>
<div class="row"><span class="n">Light · 300</span><span class="s" style="font-weight:300">Inter gjør golf tilgjengelig</span></div>
<div class="row"><span class="n">Regular · 400</span><span class="s" style="font-weight:400">Inter gjør golf tilgjengelig</span></div>
<div class="row"><span class="n">Medium · 500</span><span class="s" style="font-weight:500">Inter gjør golf tilgjengelig</span></div>
<div class="row"><span class="n">SemiBold · 600</span><span class="s" style="font-weight:600">Inter gjør golf tilgjengelig</span></div>
<div class="row"><span class="n">Bold · 700</span><span class="s" style="font-weight:700">Inter gjør golf tilgjengelig</span></div>
<div class="row"><span class="n">ExtraBold · 800</span><span class="s" style="font-weight:800">Inter gjør golf tilgjengelig</span></div>
</body></html>
