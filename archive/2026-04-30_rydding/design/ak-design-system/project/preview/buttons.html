<!doctype html>
<html lang="no"><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--ak-text);padding:24px}
  .row{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .btn{border:none;border-radius:20px;padding:10px 18px;font:600 13px Inter;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .primary{background:#005840;color:#fff}
  .secondary{background:#fff;color:#005840;border:1.5px solid #005840}
  .accent{background:#D1F843;color:#0A1F18}
  .ghost{background:transparent;color:#324D45}
  .danger{background:#B84233;color:#fff}
  .sm{padding:6px 14px;font-size:12px}
  .cap{font-size:10px;color:var(--ak-muted);font-family:var(--font-mono);text-transform:uppercase;margin-right:8px;width:90px}
</style></head><body>
<div class="row"><span class="cap">Primary</span>
  <button class="btn primary">Start økt</button>
  <button class="btn primary sm">Lagre</button>
</div>
<div class="row"><span class="cap">Accent CTA</span>
  <button class="btn accent">+ Ny oppgave</button>
  <button class="btn accent sm">Book nå</button>
</div>
<div class="row"><span class="cap">Secondary</span>
  <button class="btn secondary">Avbryt</button>
  <button class="btn ghost">Vis alt →</button>
</div>
</body></html>
