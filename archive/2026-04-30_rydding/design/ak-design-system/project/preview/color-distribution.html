<!doctype html>
<html lang="no"><head><meta charset="utf-8"><title>Color distribution</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--ak-text);padding:20px}
  .bar{display:flex;height:60px;border-radius:12px;overflow:hidden;margin-bottom:14px;border:1px solid #e8edec}
  .seg{display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
  .legend{display:flex;gap:16px;font-size:12px;color:var(--ak-muted)}
  .dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:-1px}
  .rule{font-size:11px;color:var(--ak-muted);margin-top:4px}
</style></head><body>
<div class="bar">
  <div class="seg" style="flex:60;background:#005840">60% Primary + Surface</div>
  <div class="seg" style="flex:30;background:#324D45">30% Text + Muted</div>
  <div class="seg" style="flex:10;background:#D1F843;color:#0A1F18">10% Accent</div>
</div>
<div class="legend">
  <span><span class="dot" style="background:#005840"></span>Structural fills &amp; large surfaces</span>
  <span><span class="dot" style="background:#324D45"></span>Typography &amp; secondary UI</span>
  <span><span class="dot" style="background:#D1F843"></span>CTAs &amp; active/highlight states</span>
</div>
<div class="rule">Accent is a spotlight — never a background. One glow-card per view maximum.</div>
</body></html>
