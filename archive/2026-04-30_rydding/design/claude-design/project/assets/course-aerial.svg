
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    
    <radialGradient id="rough" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#3a5a3a"></stop>
      <stop offset="60%" stop-color="#2a4228"></stop>
      <stop offset="100%" stop-color="#1a2e1a"></stop>
    </radialGradient>
    
    <linearGradient id="fairway" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8bb56a"></stop>
      <stop offset="50%" stop-color="#769e59"></stop>
      <stop offset="100%" stop-color="#638848"></stop>
    </linearGradient>
    
    <radialGradient id="green" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#9ec976"></stop>
      <stop offset="100%" stop-color="#6e9a4d"></stop>
    </radialGradient>
    
    <radialGradient id="sand" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#efe2b8"></stop>
      <stop offset="100%" stop-color="#cfbd85"></stop>
    </radialGradient>
    
    <radialGradient id="water" cx="40%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#5ba8b0"></stop>
      <stop offset="50%" stop-color="#3a7c85"></stop>
      <stop offset="100%" stop-color="#1f4d55"></stop>
    </radialGradient>
    
    <radialGradient id="tree" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#3e6a3a"></stop>
      <stop offset="60%" stop-color="#23421f"></stop>
      <stop offset="100%" stop-color="#132710"></stop>
    </radialGradient>
    
    <pattern id="stripes" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse" patternTransform="rotate(18)">
      <rect width="28" height="28" fill="url(#fairway)"></rect>
      <rect width="28" height="14" fill="#6e9555" opacity="0.35"></rect>
    </pattern>
    
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"></feGaussianBlur>
    </filter>
    <filter id="softer" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"></feGaussianBlur>
    </filter>
  </defs>

  
  <rect width="1600" height="1000" fill="url(#rough)"></rect>

  
