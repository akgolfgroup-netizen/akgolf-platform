<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Mobil Runde · Course Hero</title>
<meta name="viewport" content="width=430, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="_course-hero.css">
<style>
  html, body { height: 100%; }
  body.course-hero {
    font-size: 15px;
    overflow: hidden;
  }
  .m-screen {
    position: relative;
    width: 100%; height: 100vh;
    overflow: hidden;
    background: #0a0f0c;
  }

  .m-bg {
    position: absolute; inset: 0;
  }
  .m-bg::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(10,15,12,0.3) 0%, rgba(10,15,12,0) 30%, rgba(10,15,12,0) 60%, rgba(10,15,12,0.7) 100%);
  }

  /* Status bar spacer for notch */
  .m-top {
    position: absolute;
    top: 60px; left: 16px; right: 16px;
    display: flex; align-items: center; gap: 10px;
    z-index: 5;
  }

  .m-back {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--ch-glass-dark);
    backdrop-filter: var(--ch-blur);
    border: 1px solid var(--ch-stroke-light);
    display: grid; place-items: center;
    color: #fff;
  }

  .m-segmented {
    flex: 1;
    display: flex;
    padding: 4px;
    background: var(--ch-glass-dark);
    backdrop-filter: var(--ch-blur);
    border: 1px solid var(--ch-stroke-light);
    border-radius: 999px;
    justify-content: center;
  }
  .m-segmented button {
    flex: 1;
    padding: 8px 18px;
    border-radius: 999px;
    font-size: 13px; font-weight: 600;
    color: rgba(255,255,255,0.65);
  }
  .m-segmented button.active {
    background: #0A1F18;
    color: #fff;
  }

  /* Shot SVG */
  .m-shot-svg {
    position: absolute; inset: 0;
    z-index: 2; pointer-events: none;
  }
  .m-shot-svg .traj {
    stroke: rgba(255,255,255,0.9);
    stroke-width: 2;
    stroke-dasharray: 4 5;
    fill: none;
  }

  /* Shot layer (mobile-specific positioning) */
  .m-shot-layer {
    position: absolute; inset: 0; z-index: 3; pointer-events: none;
  }
  .m-shot-layer .ch-shot-marker { width: 28px; height: 28px; font-size: 10px; }
  .m-shot-layer .ch-distance-pill { font-size: 10px; padding: 4px 9px; }

  /* Compass cluster */
  .m-compass {
    position: absolute;
    bottom: 260px;
    left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 12px;
    z-index: 4;
  }
  .m-compass .ch-zoom-btn { width: 44px; height: 44px; font-size: 18px; }
  .m-compass .ch-compass { width: 54px; height: 54px; font-size: 15px; }

  /* Bottom glass sheet */
  .m-sheet {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 22px 20px calc(20px + env(safe-area-inset-bottom, 20px));
    background: var(--ch-glass-dark-strong);
    backdrop-filter: var(--ch-blur-strong);
    border-top: 1px solid var(--ch-stroke-light);
    border-radius: 28px 28px 0 0;
    z-index: 5;
    color: #F2F5F1;
  }
  .m-sheet-handle {
    width: 40px; height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    margin: -8px auto 16px;
  }
  .m-sheet .hdr {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .m-sheet .hdr h5 {
    margin: 0;
    font-size: 15px; font-weight: 600;
  }
  .m-sheet .ch-eyebrow { font-size: 10px; }

  .m-distance-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 10px;
  }
  .m-d-item {
    padding: 10px 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
  }
  .m-d-item.highlight {
    background: #D1F843;
    color: #0A1F18;
    border-color: transparent;
  }
  .m-d-item .lbl {
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
  }
  .m-d-item.highlight .lbl { color: rgba(10,31,24,0.6); }
  .m-d-item .v {
    font-size: 20px; font-weight: 700; letter-spacing: -0.02em;
    margin-top: 4px; line-height: 1;
  }
  .m-d-item .v .unit { font-size: 11px; opacity: 0.55; margin-left: 2px; font-weight: 500; }

  .m-action-row {
    display: flex; gap: 10px;
    margin-top: 16px;
  }
  .m-action-row .ch-btn { flex: 1; justify-content: center; padding: 14px; font-size: 13px; }

  /* Status bar fake */
  .m-statusbar {
    position: absolute;
    top: 14px; left: 0; right: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
    font-size: 15px; font-weight: 600;
    color: #fff;
    z-index: 10;
  }
  .m-statusbar-right {
    display: flex; gap: 6px; align-items: center;
  }
</style>
</head>
<body class="course-hero">

<div class="m-screen">
  <div class="m-bg">
    <object type="image/svg+xml" data="../assets/course-aerial.svg" style="width:100%;height:100%;pointer-events:none;"></object>
  </div>

  <!-- Status bar -->
  <div class="m-statusbar">
    <span>11:30</span>
    <div class="m-statusbar-right">
      <svg width="16" height="10" viewBox="0 0 16 10" fill="currentColor"><rect x="0" y="6" width="2" height="4" rx="0.5"/><rect x="4" y="4" width="2" height="6" rx="0.5"/><rect x="8" y="2" width="2" height="8" rx="0.5"/><rect x="12" y="0" width="2" height="10" rx="0.5"/></svg>
      <svg width="16" height="10" viewBox="0 0 16 12" fill="currentColor"><path d="M8 3C5.8 3 3.7 3.8 2 5.2L3.4 6.6C4.7 5.6 6.3 5 8 5s3.3.6 4.6 1.6L14 5.2C12.3 3.8 10.2 3 8 3zm0 4a4.5 4.5 0 00-3.3 1.4L6 9.8a2.5 2.5 0 014 0l1.3-1.4A4.5 4.5 0 008 7z"/></svg>
      <svg width="22" height="10" viewBox="0 0 22 10" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="17" height="9" rx="2"/><rect x="2" y="2" width="14" height="6" rx="1" fill="currentColor"/><rect x="19" y="3" width="2" height="4" rx="0.5" fill="currentColor"/></svg>
    </div>
  </div>

  <!-- Top nav -->
  <div class="m-top">
    <button class="m-back">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6"/></svg>
    </button>
    <div class="m-segmented">
      <button class="active">Strikes</button>
      <button>Statistics</button>
    </div>
  </div>

  <!-- Shot trails -->
  <svg class="m-shot-svg" viewBox="0 0 430 932" preserveAspectRatio="none">
    <path class="traj" d="M 200 780 Q 170 680 195 580 Q 220 480 265 450"/>
    <path class="traj" d="M 265 450 Q 295 440 325 435 Q 345 432 355 430"/>
  </svg>

  <!-- Shot markers -->
  <div class="m-shot-layer">
    <!-- Tee -->
    <div class="ch-shot-marker dark" style="left: 46.5%; top: 83.5%; width: 26px; height: 26px; font-size: 9px;">T</div>

    <!-- Distances -->
    <div class="ch-distance-pill" style="left: 50%; top: 48%;">242 m</div>
    <div class="ch-distance-pill" style="left: 58%; top: 58%;">182 m</div>
    <div class="ch-distance-pill" style="left: 40%; top: 64%;">23 m</div>

    <!-- Flag -->
    <div class="ch-shot-marker flag lime" style="left: 83%; top: 46%; width: 24px; height: 24px;">
      <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M5 3v18M5 4l10 3-10 3"/></svg>
    </div>

    <!-- Shot clusters (small white dots) -->
    <div class="ch-shot-cluster" style="left: 50%; top: 48%;">
      <div class="dots">
        <span style="top: -8px; left: 14px;"></span>
        <span style="top: 6px; left: 22px;"></span>
        <span style="top: 18px; left: 12px;"></span>
      </div>
    </div>
    <div class="ch-shot-cluster" style="left: 62%; top: 58%;">
      <div class="dots">
        <span style="top: -6px; left: 10px;"></span>
        <span style="top: 8px; left: 18px;"></span>
        <span style="top: 16px; left: 8px;"></span>
      </div>
    </div>
  </div>

  <!-- Compass -->
  <div class="m-compass">
    <button class="ch-zoom-btn">−</button>
    <div class="ch-compass">W</div>
    <button class="ch-zoom-btn">+</button>
  </div>

  <!-- Bottom glass sheet -->
  <div class="m-sheet">
    <div class="m-sheet-handle"></div>
    <div class="hdr">
      <div>
        <div class="ch-eyebrow"><span class="dot"></span> DISTANCES · YDS</div>
        <h5 style="margin-top: 4px;">Callaway Apex · 7i</h5>
      </div>
      <button class="ch-btn ch-btn-glass" style="padding: 6px 12px; font-size: 11px;">Bytt</button>
    </div>

    <div class="m-distance-grid">
      <div class="m-d-item">
        <div class="lbl">Short</div>
        <div class="v">100<span class="unit">m</span></div>
      </div>
      <div class="m-d-item highlight">
        <div class="lbl">Medium</div>
        <div class="v">150<span class="unit">m</span></div>
      </div>
      <div class="m-d-item" style="opacity: 0.55;">
        <div class="lbl">Long</div>
        <div class="v">182<span class="unit">m</span></div>
      </div>
    </div>

    <div class="m-action-row">
      <button class="ch-btn ch-btn-glass">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20l-7-7 7-7M5 13h14"/></svg>
        Hull 9
      </button>
      <button class="ch-btn ch-btn-lime">
        Save shot
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  window.addEventListener('message', (e) => {
    if (e.data?.type === 'ak-tweaks') {
      const s = e.data.state;
      document.body.classList.toggle('d-compact', s.density === 'compact');
      document.body.classList.toggle('d-spacious', s.density === 'spacious');
    }
  });
</script>

<script src="https://unpkg.com/lucide@latest"></script>
<script>document.addEventListener('DOMContentLoaded',()=>{if(window.lucide)lucide.createIcons();});</script>
</body>
</html>
