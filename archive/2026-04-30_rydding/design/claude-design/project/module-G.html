<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Modul G — Markedsside (Public Web)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>body { background:#0A1F18; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const Frame = ({ src }) => <iframe src={src} style={{ width: "100%", height: "100%", border: "none", display: "block" }} />;

  const App = () => (
    <DesignCanvas title="Modul G — Markedsside (Public Web)" subtitle="4 sider · cream surface · lime accent · foto-placeholders for ekte bilder">
      <DCSection id="entry" title="Forsiden — første møte">
        <DCArtboard id="g1" label="G1 — Forsiden (hero + tjenester + bevis)" width={1440} height={4400}><Frame src="screens/g1-forsiden.html"/></DCArtboard>
      </DCSection>
      <DCSection id="programs" title="Programmer — hva vi tilbyr">
        <DCArtboard id="g2" label="G2 — Academy (voksne)" width={1440} height={4800}><Frame src="screens/g2-academy.html"/></DCArtboard>
        <DCArtboard id="g3" label="G3 — Junior Academy (6–17 år)" width={1440} height={5000}><Frame src="screens/g3-junior-academy.html"/></DCArtboard>
      </DCSection>
      <DCSection id="commerce" title="Pricing & booking">
        <DCArtboard id="g4" label="G4 — Priser (alt samlet)" width={1440} height={4900}><Frame src="screens/g4-pricing.html"/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
