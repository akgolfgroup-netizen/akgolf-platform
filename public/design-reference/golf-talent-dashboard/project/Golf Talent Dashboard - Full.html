<!doctype html>
<html lang="nb">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Golf Talent Dashboard — Pipeline (interaktiv)</title>
<link rel="stylesheet" href="colors_and_type.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #ECF0EF;
    color: #324D45;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .app-shell {
    min-height: 100vh;
    margin-left: 56px;
  }
  button { font-family: inherit; }
  ::selection { background: rgba(209,248,67,0.3); color: white; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
<script type="text/babel" src="views.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="dg_screens.jsx"></script>
<script type="text/babel" src="juniors_screens.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;
const { Sidebar, TopBar } = window.PIPELINE_UI;
const { PipelineView, PlayerProfile, BenchView } = window.PIPELINE_VIEWS;
const { DashboardView, FullPlayerProfile } = window.PIPELINE_SCREENS;
const { DgSgTab, DgExplorerView } = window.PIPELINE_DG;
const { JuniorsView } = window.PIPELINE_JUNIORS;
const { TWEAK_DEFAULTS, STAGES, PLAYERS } = window.PIPELINE_DATA;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [view, setView] = useState('dashboard');
  const [activePlayer, setActivePlayer] = useState(null);
  const [profileMode, setProfileMode] = useState('page'); // 'page' | 'overlay'
  const [season, setSeason] = useState('2026');

  useEffect(() => {
    if (tweaks.concept === 'bench' && view === 'pipeline') setView('bench');
    if (tweaks.concept === 'pipeline' && view === 'bench') setView('pipeline');
  }, [tweaks.concept]);

  const totalPipeline = STAGES.reduce((s, x) => s + x.count, 0);
  const inProfilePage = activePlayer && profileMode === 'page';

  const openPlayer = (p) => { setActivePlayer(p); setProfileMode('page'); };
  const closeProfile = () => setActivePlayer(null);

  const stageLabel =
    inProfilePage ? 'Spillerprofil' :
    view === 'dashboard' ? 'Oversikt' :
    view === 'bench' ? 'Sammenligning' :
    view === 'juniors' ? 'Norske juniorer & amatører' :
    view === 'data' ? 'DataGolf' :
    'Norske talenter';

  return (
    <>
      <Sidebar activeView={inProfilePage ? 'players' : view} onSelect={(v) => {
        closeProfile();
        if (v === 'pipeline' || v === 'players') { setView('pipeline'); setTweak('concept', 'pipeline'); }
        else if (v === 'bench') { setView('bench'); setTweak('concept', 'bench'); }
        else if (v === 'log' || v === 'data' || v === 'bench-mark' || v === 'files' || v === 'juniors') setView(v);
        else setView('dashboard');
      }} />
      <div className="app-shell">
        <TopBar
          stageName={stageLabel}
          totalCount={totalPipeline}
          season={season}
          onSeason={setSeason}
          kohort={tweaks.kohort}
          onKohort={(v) => setTweak('kohort', v)}
          onExport={() => {}}
          onSearch={() => {}}
        />
        {inProfilePage ? (
          <FullPlayerProfile player={activePlayer} onBack={closeProfile} onPlayer={openPlayer} />
        ) : view === 'dashboard' ? (
          <DashboardView onPlayer={openPlayer} />
        ) : view === 'bench' ? (
          <BenchView tweaks={tweaks} onPlayer={openPlayer} />
        ) : view === 'data' ? (
          <DgExplorerView onPlayer={openPlayer} />
        ) : view === 'juniors' ? (
          <JuniorsView onPlayer={openPlayer} />
        ) : (
          <PipelineView tweaks={tweaks} onPlayer={openPlayer} />
        )}
      </div>

      <TweaksPanel>
        <TweakSection label="Konsept" />
        <TweakRadio label="Modus" value={tweaks.concept}
          options={[{value:'pipeline',label:'Pipeline'},{value:'bench',label:'Benk'}]}
          onChange={(v) => setTweak('concept', v)} />

        <TweakSection label="Filter" />
        <TweakSelect label="Kohort" value={tweaks.kohort}
          options={[
            {value:'alle',label:'Alle aldre'},
            {value:'2004-2006',label:'Født 2004–2006'},
            {value:'2007-2009',label:'Født 2007–2009'},
            {value:'2010+',label:'Født 2010+'},
          ]}
          onChange={(v) => setTweak('kohort', v)} />
        <TweakToggle label="Vis kun klare for opprykk" value={tweaks.showReadyOnly}
          onChange={(v) => setTweak('showReadyOnly', v)} />

        <TweakSection label="Visning" />
        <TweakToggle label="Kompakte spiller-kort" value={tweaks.compactCards}
          onChange={(v) => setTweak('compactCards', v)} />
        <TweakToggle label="Vis ML-flagg (opprykksvarsel)" value={tweaks.showAlgoFlags}
          onChange={(v) => setTweak('showAlgoFlags', v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
