<!doctype html>
<html lang="no"><head><meta charset="utf-8"><title>Logotype</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--ak-text)}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px}
  .tile{border-radius:12px;height:170px;display:flex;align-items:center;justify-content:center;border:1px solid #e8edec}
  .tile img{max-height:110px;max-width:70%}
  .cap{font-size:10px;color:var(--ak-muted);text-align:center;margin-top:6px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.04em}
  .cell{display:flex;flex-direction:column}
</style></head><body>
<div class="grid">
  <div class="cell"><div class="tile" style="background:#fff"><img src="../assets/logos/ak-golf-logo-primary-on-light.svg"></div><div class="cap">Primary · on light</div></div>
  <div class="cell"><div class="tile" style="background:#102B1E"><img src="../assets/logos/ak-golf-logo-primary-on-dark.svg"></div><div class="cap">Primary · on dark</div></div>
  <div class="cell"><div class="tile" style="background:#005840"><img src="../assets/logos/ak-golf-logo-white-on-green.svg"></div><div class="cap">White · on green</div></div>
</div>
</body></html>
