<!doctype html>
<html lang="no"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--ak-text);padding:20px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;text-align:center}
  .swatch{height:80px;background:#005840;margin-bottom:8px}
  .lbl{font-size:11px;color:var(--ak-muted);font-family:var(--font-mono);text-transform:uppercase}
  .v{font-size:11px;color:var(--ak-text);font-weight:600;margin-top:2px}
</style></head><body>
<div class="grid">
  <div><div class="swatch" style="border-radius:8px"></div><div class="lbl">sm</div><div class="v">8 px</div></div>
  <div><div class="swatch" style="border-radius:12px"></div><div class="lbl">md</div><div class="v">12 px</div></div>
  <div><div class="swatch" style="border-radius:16px"></div><div class="lbl">card</div><div class="v">16 px</div></div>
  <div><div class="swatch" style="border-radius:20px"></div><div class="lbl">pill</div><div class="v">20 px</div></div>
  <div><div class="swatch" style="border-radius:50%;background:linear-gradient(135deg,#005840,#D1F843)"></div><div class="lbl">avatar</div><div class="v">50%</div></div>
</div>
</body></html>
