<!doctype html>
<html lang="no"><head><meta charset="utf-8"><title>Form inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;color:#324D45;font-family:Inter,sans-serif;padding:24px}
  .field{margin-bottom:14px}
  .lbl{display:block;font-size:11px;font-weight:500;margin-bottom:4px;color:#324D45;text-transform:uppercase;letter-spacing:.04em}
  input,select{width:100%;box-sizing:border-box;padding:10px 14px;border-radius:12px;border:1px solid #e0e8e5;font:400 14px Inter;background:#fff;color:#324D45}
  input:focus{outline:2px solid rgba(209,248,67,.5);outline-offset:1px;border-color:#005840}
  .hint{font-size:11px;color:#A5B2AD;margin-top:4px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
</style></head><body>
<div class="row">
  <div class="field"><label class="lbl">Spiller</label><input value="Magnus Kristiansen"></div>
  <div class="field"><label class="lbl">Handicap</label><input value="15.9" style="border-color:#005840;outline:2px solid rgba(209,248,67,.5);outline-offset:1px"></div>
</div>
<div class="field"><label class="lbl">Klubb</label>
  <select><option>Gamle Fredrikstad GK</option></select>
</div>
<div class="field"><label class="lbl">Notat</label>
  <input placeholder="Skriv en kommentar…">
  <div class="hint">Synlig kun for coach</div>
</div>
</body></html>
