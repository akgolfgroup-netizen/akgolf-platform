<!doctype html>
<html lang="no"><head><meta charset="utf-8"><title>Logo — mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#fff;font-family:var(--font-body);color:var(--ak-text)}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px}
  .tile{border-radius:12px;height:150px;display:flex;align-items:center;justify-content:center;border:1px solid #e8edec}
  .tile img{max-height:90px;max-width:70%}
  .cap{font-size:10px;color:var(--ak-muted);text-align:center;margin-top:6px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.04em}
</style></head><body>
<div class="grid">
  <div><div class="tile" style="background:#fff"><img src="../assets/logos/ak-golf-logo-black-mono.svg"></div><div class="cap">Black mono</div></div>
  <div><div class="tile" style="background:#fff"><img src="../assets/logos/ak-golf-logo-primary-mono.svg"></div><div class="cap">Primary mono</div></div>
  <div><div class="tile" style="background:#102B1E"><img src="../assets/logos/ak-golf-logo-white-mono.svg"></div><div class="cap">White mono</div></div>
</div>
</body></html>
