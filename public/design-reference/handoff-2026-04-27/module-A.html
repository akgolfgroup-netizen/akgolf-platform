<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Modul A — PlayerHQ Spiller</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<style>body { background:#0A1F18; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const Frame = ({ src }) => <iframe src={src} style={{ width: "100%", height: "100%", border: "none", display: "block" }} />;

  const App = () => (
    <DesignCanvas title="Modul A — PlayerHQ Spiller" subtitle="22 skjermer · V2 Cockpit dark · Erik Kvist · Performance 12 mnd">
      <DCSection id="onboard" title="Onboarding — første gang inn">
        <DCArtboard id="a7" label="A7 — Onboarding 5-steg" width={1440} height={1700}><Frame src="screens/a7-onboarding.html"/></DCArtboard>
        <DCArtboard id="a8" label="A8 — Kartlegging" width={1440} height={1900}><Frame src="screens/a8-kartlegging.html"/></DCArtboard>
      </DCSection>
      <DCSection id="profile" title="Min side — identitet og 360°">
        <DCArtboard id="a1" label="A1 — Min profil" width={1440} height={1500}><Frame src="screens/a1-min-profil.html"/></DCArtboard>
        <DCArtboard id="a2" label="A2 — Innstillinger" width={1440} height={1700}><Frame src="screens/a2-profil-innstillinger.html"/></DCArtboard>
        <DCArtboard id="a10" label="A10 — PlayerHQ 360°" width={1440} height={2400}><Frame src="screens/a10-playerhq-360.html"/></DCArtboard>
      </DCSection>
      <DCSection id="plan" title="Plan — nordstjerne og uke">
        <DCArtboard id="a3" label="A3 — Min plan" width={1440} height={1700}><Frame src="screens/a3-min-plan.html"/></DCArtboard>
        <DCArtboard id="a5" label="A5 — Treningsplan" width={1440} height={1800}><Frame src="screens/a5-treningsplan.html"/></DCArtboard>
        <DCArtboard id="a6" label="A6 — Treningsplan detalj" width={1440} height={1800}><Frame src="screens/a6-treningsplan-detalj.html"/></DCArtboard>
      </DCSection>
      <DCSection id="cal" title="Kalender — bookinger og planlegger">

        <DCArtboard id="a9" label="A9 — Treningsplanlegger" width={1600} height={1700}><Frame src="screens/a9-kalender.html"/></DCArtboard>
      </DCSection>
      <DCSection id="comm" title="Kommunikasjon & sosialt">
        <DCArtboard id="a12" label="A12 — Meldinger m/ coach" width={1440} height={1100}><Frame src="screens/a12-meldinger.html"/></DCArtboard>
        <DCArtboard id="a22" label="A22 — Sosialt (lag, leaderboard)" width={1440} height={1500}><Frame src="screens/a22-sosialt.html"/></DCArtboard>
        <DCArtboard id="a13" label="A13 — Sammenligning" width={1440} height={1500}><Frame src="screens/a13-sammenligning.html"/></DCArtboard>
      </DCSection>
      <DCSection id="perf" title="Performance — strategi, mental, talent">
        <DCArtboard id="a14" label="A14 — Strategi" width={1440} height={1500}><Frame src="screens/a14-strategi.html"/></DCArtboard>
        <DCArtboard id="a15" label="A15 — Tester (TPI / fysiske)" width={1440} height={1500}><Frame src="screens/a15-tester.html"/></DCArtboard>

        <DCArtboard id="a19" label="A19 — Turneringer" width={1440} height={1500}><Frame src="screens/a19-turneringer.html"/></DCArtboard>
        <DCArtboard id="a20" label="A20 — Bag (utstyr)" width={1440} height={1500}><Frame src="screens/a20-bag.html"/></DCArtboard>
        <DCArtboard id="a21" label="A21 — Coaching-historikk" width={1440} height={1500}><Frame src="screens/a21-coaching-historikk.html"/></DCArtboard>
      </DCSection>
      <DCSection id="mob" title="Mobile — på farten">
        <DCArtboard id="mobile-playerhq" label="Mobile · PlayerHQ (3 skjermer)" width={1380} height={1300}><Frame src="screens/mobile-playerhq.html"/></DCArtboard>

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
