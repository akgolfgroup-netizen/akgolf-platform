<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <title>Spillerportalen — Salgspresentasjon 2026 · AK Golf Group</title>
  <link rel="icon" type="image/svg+xml" href="assets/logos/ak-golf-logo-primary-on-light.svg">
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; background: #000; }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; }
  </style>
  <script type="application/json" id="speaker-notes">[]</script>
  <script src="deck-stage.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <deck-stage width="1920" height="1080" id="deck">
    <section id="s1"  data-label="Cover"></section>
    <section id="s2"  data-label="Agenda"></section>
    <section id="s3"  data-label="Del 1 — Marked"></section>
    <section id="s4"  data-label="Marked"></section>
    <section id="s5"  data-label="Forventninger"></section>
    <section id="s6"  data-label="Del 2 — Produkt"></section>
    <section id="s7"  data-label="Tre brukere"></section>
    <section id="s8"  data-label="Dashbord"></section>
    <section id="s9"  data-label="Handicap"></section>
    <section id="s10" data-label="Trening"></section>
    <section id="s11" data-label="Mobil"></section>
    <section id="s12" data-label="Del 3 — Klubb"></section>
    <section id="s13" data-label="Administrasjon"></section>
    <section id="s14" data-label="Resultater"></section>
    <section id="s15" data-label="Del 4 — Pakker"></section>
    <section id="s16" data-label="Priser"></section>
    <section id="s17" data-label="Oppstart"></section>
    <section id="s18" data-label="Kontakt"></section>
  </deck-stage>

  <script type="text/babel" src="slides.jsx"></script>
  <script type="text/babel" src="slides-2.jsx"></script>

  <script type="text/babel">
    // ── Tweaks (accent + cover variant) ──────────────────────────
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "lime",
      "coverVariant": "split"
    }/*EDITMODE-END*/;

    const TOTAL = 18;

    function mount(id, el) {
      const root = document.getElementById(id);
      if (!root._r) root._r = ReactDOM.createRoot(root);
      root._r.render(el);
    }

    function renderAll(tweaks) {
      const accent = ACCENT_OPTIONS[tweaks.accent] || ACCENT_OPTIONS.lime;
      mount('s1',  <SlideCover total={TOTAL} variant={tweaks.coverVariant} />);
      mount('s2',  <SlideAgenda total={TOTAL} />);
      mount('s3',  <SectionHeader n={1} total={TOTAL} kicker="Del én" title="Norsk golf i dag" accent={accent} />);
      mount('s4',  <SlideMarket total={TOTAL} />);
      mount('s5',  <SlideExpectations total={TOTAL} />);
      mount('s6',  <SectionHeader n={2} total={TOTAL} kicker="Del to" title="Hva Spillerportalen er" accent={accent} />);
      mount('s7',  <SlideWhatIs total={TOTAL} />);
      mount('s8',  <SlideDashboard total={TOTAL} />);
      mount('s9',  <SlideHandicap total={TOTAL} />);
      mount('s10', <SlideTraining total={TOTAL} />);
      mount('s11', <SlideMobile total={TOTAL} />);
      mount('s12', <SectionHeader n={3} total={TOTAL} kicker="Del tre" title="For klubben" accent={accent} />);
      mount('s13', <SlideAdmin total={TOTAL} />);
      mount('s14', <SlideResults total={TOTAL} />);
      mount('s15', <SectionHeader n={4} total={TOTAL} kicker="Del fire" title="Pakker og oppstart" accent={accent} />);
      mount('s16', <SlidePricing total={TOTAL} />);
      mount('s17', <SlideOnboarding total={TOTAL} />);
      mount('s18', <SlideContact total={TOTAL} />);
    }

    let tweaks = { ...TWEAK_DEFAULTS };
    renderAll(tweaks);

    // ── Tweaks panel (hidden by default) ─────────────────────────
    const panel = document.createElement('div');
    panel.style.cssText = `
      position: fixed; right: 24px; bottom: 80px; z-index: 2147482500;
      background: #fff; color: #0A1F18; border-radius: 16px;
      padding: 20px; width: 280px; font-family: Inter, system-ui, sans-serif;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25); display: none;
      border: 1px solid #E0E8E5;
    `;
    panel.innerHTML = `
      <div style="font-size: 16px; font-weight: 700; margin-bottom: 14px; letter-spacing: -0.01em;">Tweaks</div>
      <div style="font-size: 11px; font-weight: 600; color: #A5B2AD; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px;">Seksjonsfarge</div>
      <div id="tw-accent" style="display: flex; gap: 8px; margin-bottom: 20px;"></div>
      <div style="font-size: 11px; font-weight: 600; color: #A5B2AD; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px;">Forside-layout</div>
      <div id="tw-cover" style="display: flex; flex-direction: column; gap: 6px;"></div>
    `;
    document.body.appendChild(panel);

    const accentRow = panel.querySelector('#tw-accent');
    Object.entries(ACCENT_OPTIONS).forEach(([key, opt]) => {
      const b = document.createElement('button');
      b.style.cssText = `
        flex: 1; padding: 10px 0; border-radius: 10px; border: 1.5px solid transparent;
        background: ${opt.color}; color: ${opt.textOn}; font-size: 12px; font-weight: 600;
        cursor: pointer; font-family: inherit;
      `;
      b.textContent = opt.name;
      b.dataset.key = key;
      b.onclick = () => {
        tweaks.accent = key;
        renderAll(tweaks);
        updateActive();
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent: key } }, '*');
      };
      accentRow.appendChild(b);
    });

    const coverCol = panel.querySelector('#tw-cover');
    [['split','Split · dashbord'],['center','Sentrert'],['banner','Banner']].forEach(([k,l]) => {
      const b = document.createElement('button');
      b.style.cssText = `
        padding: 10px 12px; border-radius: 10px; border: 1.5px solid #E0E8E5;
        background: #fff; color: #324D45; font-size: 13px; font-weight: 500;
        cursor: pointer; text-align: left; font-family: inherit;
      `;
      b.textContent = l;
      b.dataset.key = k;
      b.onclick = () => {
        tweaks.coverVariant = k;
        renderAll(tweaks);
        updateActive();
        document.querySelector('deck-stage').goTo(0);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { coverVariant: k } }, '*');
      };
      coverCol.appendChild(b);
    });

    function updateActive() {
      accentRow.querySelectorAll('button').forEach(b => {
        b.style.borderColor = b.dataset.key === tweaks.accent ? '#0A1F18' : 'transparent';
      });
      coverCol.querySelectorAll('button').forEach(b => {
        const active = b.dataset.key === tweaks.coverVariant;
        b.style.borderColor = active ? '#005840' : '#E0E8E5';
        b.style.background  = active ? '#F5F8F6' : '#fff';
        b.style.fontWeight  = active ? 700 : 500;
      });
    }
    updateActive();

    // Edit-mode protocol
    window.addEventListener('message', (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') panel.style.display = 'block';
      if (d.type === '__deactivate_edit_mode') panel.style.display = 'none';
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  </script>
</body>
</html>
