<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <title>Spillerportal Dashboard — AK Golf Group</title>
  <link rel="icon" type="image/png" href="assets/favicon/favicon-32x32.png">
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    html, body { margin: 0; padding: 0; background: #0A1F18; font-family: 'Inter', system-ui, sans-serif; }
    * { box-sizing: border-box; }
  </style>
  <!-- Lucide (official icon library per brand guide) -->
  <script src="https://unpkg.com/lucide@0.462.0/dist/umd/lucide.min.js"></script>
  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Design canvas host -->
  <script type="text/babel" src="design-canvas.jsx"></script>
  <!-- Tweaks panel host -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <!-- Shared tokens + primitives + charts -->
  <script type="text/babel" src="shared/tokens.jsx"></script>
  <script type="text/babel" src="shared/primitives.jsx"></script>
  <script type="text/babel" src="shared/charts.jsx"></script>
  <script type="text/babel" src="shared/profile.jsx"></script>

  <!-- Screen compositions -->
  <script type="text/babel" src="screens/shared-nav.jsx"></script>
  <script type="text/babel" src="screens/dashboard-a.jsx"></script>
  <script type="text/babel" src="screens/dashboard-b.jsx"></script>

  <!-- Host page -->
  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    /* Tweak defaults — small surface: accent intensity + density */
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#D1F843",
      "compact": false,
      "showGlow": true
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // override accent token live
      React.useEffect(() => {
        window.__akAccent = tweaks.accent;
      }, [tweaks.accent]);

      return (
        <>
          <DesignCanvas
            title="Spillerportal Dashboard"
            subtitle="3 skjermer · AK Golf Group · 1440+ desktop"
            bg="#050E0A"
          >
            <DCSection id="dashboards" title="Spillerportal — Hjem" subtitle="Samme flate, tre retninger. 1440 × 900 designrom.">
              <DCArtboard id="a-dark" label="01 · System-tro · Dark" width={1440} height={1020}>
                <DashboardA theme="dark" />
              </DCArtboard>
              <DCArtboard id="a-light" label="02 · System-tro · Light" width={1440} height={1020}>
                <DashboardA theme="light" />
              </DCArtboard>
              <DCArtboard id="b-dark" label="03 · Coach-first · Dark" width={1440} height={1080}>
                <DashboardB theme="dark" />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Aksent">
              <TweakRadio
                label="Aksentfarge"
                value={tweaks.accent}
                onChange={v => setTweak("accent", v)}
                options={[
                  { label: "Lime (brand)", value: "#D1F843" },
                  { label: "Lime +",        value: "#B9E034" },
                  { label: "Pine (mørk)",  value: "#005840" },
                ]}
              />
              <TweakToggle
                label="Glow på hero-kort"
                value={tweaks.showGlow}
                onChange={v => setTweak("showGlow", v)}
              />
            </TweakSection>
            <TweakSection title="Info">
              <div style={{ fontSize: 11, color: "#8FA39B", lineHeight: 1.5, fontFamily: "Inter, sans-serif" }}>
                Tre dashboardvarianter side-om-side. Dra for å omrokere, klikk etiketten for fullskjerm.
              </div>
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
